<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Performance Intelligence Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap');

  :root {
    --bg: #060A14;
    --surface: #0D1526;
    --surface2: #131d35;
    --border: #1e2d4a;
    --accent: #00D4FF;
    --accent2: #7C3AED;
    --accent3: #10B981;
    --danger: #EF4444;
    --warn: #F59E0B;
    --text: #E2E8F0;
    --muted: #64748B;
    --card-glow: 0 0 30px rgba(0,212,255,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #060A14 0%, #0D1526 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }
  .header-brand {
    display: flex; align-items: center; gap: 14px;
  }
  .header-logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header-title { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .header-badge {
    background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent); border-radius: 20px; padding: 4px 12px; font-size: 11px;
    font-family: 'Space Mono', monospace; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* LAYOUT */
  .app { display: flex; height: calc(100vh - 73px); }

  /* SIDEBAR */
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 0;
  }
  .sidebar-section { padding: 0 16px 12px; }
  .sidebar-label { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; padding: 0 4px; }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--muted);
    transition: all 0.2s; border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active {
    background: rgba(0,212,255,0.08); color: var(--accent);
    border-color: rgba(0,212,255,0.2);
  }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .agent-list { display: flex; flex-direction: column; gap: 4px; }
  .agent-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 8px; cursor: pointer;
    font-size: 12px; font-family: 'Space Mono', monospace; color: var(--muted);
    transition: all 0.2s; border: 1px solid transparent;
  }
  .agent-item:hover { background: var(--surface2); color: var(--text); }
  .agent-item.active { background: rgba(124,58,237,0.1); color: #a78bfa; border-color: rgba(124,58,237,0.2); }
  .agent-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--accent3); }
  .dot-yellow { background: var(--warn); }
  .dot-red { background: var(--danger); }

  .divider { height: 1px; background: var(--border); margin: 12px 16px; }

  /* MAIN */
  .main { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 10px; padding: 4px; border: 1px solid var(--border); width: fit-content; }
  .tab {
    padding: 8px 18px; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--muted); transition: all 0.2s;
  }
  .tab.active { background: var(--accent2); color: white; }
  .tab:hover:not(.active) { color: var(--text); }

  /* CARDS */
  .cards-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
    box-shadow: var(--card-glow);
    transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(0,212,255,0.3); }
  .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .card-value { font-size: 28px; font-weight: 700; font-family: 'Space Mono', monospace; }
  .card-value.cyan { color: var(--accent); }
  .card-value.purple { color: #a78bfa; }
  .card-value.green { color: var(--accent3); }
  .card-value.orange { color: var(--warn); }
  .card-delta { font-size: 11px; margin-top: 6px; }
  .delta-up { color: var(--accent3); }
  .delta-down { color: var(--danger); }

  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .chart-sub { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
  .chart-wrap { position: relative; }

  /* GRID LAYOUTS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-60-40 { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; }

  /* ML PANEL */
  .ml-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
  .ml-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .ml-desc { font-size: 12px; color: var(--muted); margin-bottom: 20px; }

  .algo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .algo-btn {
    padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted); cursor: pointer;
    font-size: 11px; font-family: 'Space Mono', monospace; text-align: center;
    transition: all 0.2s; line-height: 1.4;
  }
  .algo-btn:hover { border-color: var(--accent); color: var(--text); }
  .algo-btn.selected { border-color: var(--accent); background: rgba(0,212,255,0.08); color: var(--accent); }

  .run-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 24px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent2), #4f46e5);
    color: white; border: none; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: all 0.2s; font-family: 'DM Sans', sans-serif;
  }
  .run-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(124,58,237,0.4); }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESULTS TABLE */
  .results-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 16px; }
  .results-table th { 
    text-align: left; padding: 10px 12px; font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
  }
  .results-table td { padding: 10px 12px; border-bottom: 1px solid rgba(30,45,74,0.5); }
  .results-table tr:hover td { background: rgba(255,255,255,0.02); }

  /* RISK BADGES */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700;
    font-family: 'Space Mono', monospace; letter-spacing: 0.04em;
  }
  .badge-low { background: rgba(16,185,129,0.15); color: var(--accent3); border: 1px solid rgba(16,185,129,0.3); }
  .badge-medium { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid rgba(245,158,11,0.3); }
  .badge-high { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* PREDICTION DISPLAY */
  .pred-box {
    background: linear-gradient(135deg, rgba(0,212,255,0.05), rgba(124,58,237,0.05));
    border: 1px solid rgba(0,212,255,0.2); border-radius: 10px; padding: 16px;
  }
  .pred-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
  .pred-value { font-size: 22px; font-weight: 700; font-family: 'Space Mono', monospace; color: var(--accent); }
  .pred-row { display: flex; gap: 12px; }
  .pred-item { flex: 1; }

  /* METRIC BARS */
  .metric-bar-wrap { margin: 8px 0; }
  .metric-bar-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
  .metric-bar-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .metric-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

  /* AI OUTPUT */
  .ai-output {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; font-size: 12px; line-height: 1.7; color: var(--text);
    min-height: 60px; white-space: pre-wrap;
  }
  .ai-output.loading { color: var(--muted); }

  /* MODEL COMPARISON */
  .model-scores { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 16px; }
  .model-score-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px;
    text-align: center; transition: all 0.2s;
  }
  .model-score-card.best { border-color: var(--accent3); background: rgba(16,185,129,0.05); }
  .model-name { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); margin-bottom: 6px; }
  .model-r2 { font-size: 20px; font-weight: 700; color: var(--text); }
  .model-r2.best-score { color: var(--accent3); }
  .model-rmse { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .best-label { font-size: 9px; font-family: 'Space Mono', monospace; color: var(--accent3); margin-top: 4px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* SECTION HEADERS */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .section-badge { font-size: 10px; font-family: 'Space Mono', monospace; background: rgba(0,212,255,0.1); color: var(--accent); padding: 2px 8px; border-radius: 4px; }

  .hidden { display: none !important; }

  /* TOOLTIP-STYLE INFO */
  .info-chip {
    display: inline-block; background: rgba(245,158,11,0.1); color: var(--warn);
    border: 1px solid rgba(245,158,11,0.2); border-radius: 4px; padding: 2px 8px;
    font-size: 10px; font-family: 'Space Mono', monospace;
  }

  .select-styled {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 8px; font-size: 12px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; outline: none;
  }
  .select-styled:focus { border-color: var(--accent); }

  .flex { display: flex; }
  .items-center { align-items: center; }
  .gap-3 { gap: 12px; }
  .gap-2 { gap: 8px; }
  .mt-3 { margin-top: 12px; }
  .mt-4 { margin-top: 16px; }

  .pred-month-tag {
    display: inline-block; background: rgba(16,185,129,0.1); color: var(--accent3);
    border: 1px solid rgba(16,185,129,0.2); border-radius: 6px;
    padding: 4px 12px; font-size: 11px; font-family: 'Space Mono', monospace;
    margin-bottom: 16px;
  }
</style>
</head>

// UTILITY FUNCTIONS (Pure JS ML)
// ============================================================
function getAgentData(agent) {
  return MONTHS.map(m => MONTHLY_DATA.find(d=>d.AGENTCODE===agent && d.MONTH===m) || null);
}

function linearRegression(y) {
  const n = y.length, x = y.map((_,i)=>i+1);
  const sx = x.reduce((a,b)=>a+b,0), sy = y.reduce((a,b)=>a+b,0);
  const sxy = x.reduce((a,_,i)=>a+x[i]*y[i],0);
  const sx2 = x.reduce((a,b)=>a+b*b,0);
  const slope = (n*sxy - sx*sy)/(n*sx2 - sx*sx);
  const intercept = (sy - slope*sx)/n;
  return { slope, intercept, predict: (xi) => slope*xi + intercept };
}

function exponentialSmoothing(y, alpha=0.7) {
  let s = y[0];
  for(let i=1;i<y.length;i++) s = alpha*y[i] + (1-alpha)*s;
  return s + (y[y.length-1] - y[y.length-2]) * 0.5;
}

function movingAverage(y, w=2) {
  const recent = y.slice(-w);
  return recent.reduce((a,b)=>a+b,0)/recent.length;
}

function weightedMovingAverage(y) {
  const w = y.map((_,i)=>i+1);
  const wsum = w.reduce((a,b)=>a+b,0);
  return y.reduce((s,v,i)=>s+v*w[i],0)/wsum;
}

function polynomialPredict(y) {
  // Quadratic fit
  const n=y.length, x=y.map((_,i)=>i+1);
  let sx=0,sx2=0,sx3=0,sx4=0,sy=0,sxy=0,sx2y=0;
  for(let i=0;i<n;i++){
    sx+=x[i];sx2+=x[i]**2;sx3+=x[i]**3;sx4+=x[i]**4;
    sy+=y[i];sxy+=x[i]*y[i];sx2y+=x[i]**2*y[i];
  }
  const A=[[n,sx,sx2],[sx,sx2,sx3],[sx2,sx3,sx4]];
  const B=[sy,sxy,sx2y];
  // Cramer / Gaussian elimination
  for(let i=0;i<3;i++){
    for(let j=i+1;j<3;j++){
      const f=A[j][i]/A[i][i];
      for(let k=0;k<3;k++) A[j][k]-=f*A[i][k];
      B[j]-=f*B[i];
    }
  }
  const c=[0,0,0];
  for(let i=2;i>=0;i--){
    c[i]=B[i];
    for(let j=i+1;j<3;j++) c[i]-=A[i][j]*c[j];
    c[i]/=A[i][i];
  }
  const xi=n+1;
  return c[0]+c[1]*xi+c[2]*xi**2;
}

function randomForestPredict(y) {
  // Simulate RF: ensemble of perturbed linear predictors
  const models=[];
  for(let i=0;i<20;i++){
    const py=y.map(v=>v*(0.9+Math.random()*0.2));
    const r=linearRegression(py);
    models.push(r.predict(y.length+1));
  }
  return models.reduce((a,b)=>a+b,0)/models.length;
}

function svmPredict(y) {
  // Simulate SVM regression with RBF-like smoothing
  const lr = linearRegression(y);
  const trend = lr.predict(y.length+1);
  const variance = y.reduce((s,v)=>{const d=v-y.reduce((a,b)=>a+b,0)/y.length; return s+d*d;},0)/y.length;
  const sigma = Math.sqrt(variance);
  return trend + sigma * 0.1 * (y[y.length-1]>y[y.length-2]?1:-1);
}

function xgboostPredict(y) {
  const lr = linearRegression(y);
  const base = lr.predict(y.length+1);
  const residuals = y.map((v,i)=>v - lr.predict(i+1));
  const lastRes = residuals[residuals.length-1];
  return base + lastRes * 0.8;
}

function lstmPredict(y) {
  // Simulate LSTM: sequence-aware with gating
  const gate = Math.tanh(y[y.length-1] / (y[y.length-2]||1));
  const trend = y[y.length-1] - y[y.length-2];
  return y[y.length-1] + trend * gate;
}

function arimaPedict(y) {
  // AR(1) + first difference
  const diff = y.slice(1).map((v,i)=>v-y[i]);
  const ar = linearRegression(diff);
  const nextDiff = ar.predict(diff.length+1);
  return y[y.length-1] + nextDiff;
}

const ALGORITHMS = {
  'Linear Regression': (y) => linearRegression(y).predict(y.length+1),
  'Exp. Smoothing':    exponentialSmoothing,
  'Moving Average':    movingAverage,
  'Weighted MA':       weightedMovingAverage,
  'Polynomial Fit':    polynomialPredict,
  'Random Forest':     randomForestPredict,
  'SVM Regression':    svmPredict,
  'XGBoost Sim':       xgboostPredict,
  'LSTM Sim':          lstmPredict,
  'ARIMA Sim':         arimaPedict,
};

function computeR2(y, preds) {
  const ymean = y.reduce((a,b)=>a+b,0)/y.length;
  const ss_tot = y.reduce((s,v)=>s+(v-ymean)**2,0);
  const ss_res = y.reduce((s,v,i)=>s+(v-preds[i])**2,0);
  return Math.max(0, Math.min(1, 1 - ss_res/ss_tot));
}

function computeRMSE(y, preds) {
  const mse = y.reduce((s,v,i)=>s+(v-preds[i])**2,0)/y.length;
  return Math.sqrt(mse);
}

function computeRisk(agent) {
  const data = getAgentData(agent).filter(Boolean);
  if(data.length < 2) return {level:'Unknown', score:50, factors:[]};
  const txns = data.map(d=>d.total_txn);
  const amts = data.map(d=>d.total_amt);
  let score = 0;
  const factors = [];

  // Trend
  const txnChange = (txns[txns.length-1] - txns[0]) / txns[0];
  if(txnChange < -0.2) { score += 30; factors.push('Declining transaction volume'); }
  else if(txnChange < 0) { score += 10; factors.push('Slight volume decline'); }

  // Activity consistency
  const days = data.map(d=>d.active_days);
  const minDay = Math.min(...days);
  if(minDay < 15) { score += 20; factors.push('Inconsistent activity days'); }

  // Withdrawal dominance
  const last = data[data.length-1];
  const wdRatio = last.wd_cnt / (last.total_txn||1);
  if(wdRatio > 0.85) { score += 15; factors.push('High withdrawal concentration'); }

  // Amount trend
  const amtChange = (amts[amts.length-1]-amts[0])/amts[0];
  if(amtChange < -0.15) { score += 20; factors.push('Declining transaction amounts'); }

  // Low volume
  if(last.total_txn < 100) { score += 15; factors.push('Low absolute transaction volume'); }

  score = Math.min(score, 100);
  const level = score >= 50 ? 'HIGH' : score >= 25 ? 'MEDIUM' : 'LOW';
  return { level, score, factors };
}

function renderSidebar() {
  const list = document.getElementById('agent-list');
  list.innerHTML = AGENTS.map(a => {
    const risk = computeRisk(a);
    const dotClass = risk.level==='HIGH'?'dot-red':risk.level==='MEDIUM'?'dot-yellow':'dot-green';
    const isActive = a === selectedAgent;
    return `<div class="agent-item ${isActive?'active':''}" onclick="selectAgent('${a}')">
      <span class="agent-dot ${dotClass}"></span>
      ${a.replace('IOB','')}
    </div>`;
  }).join('');
}

function selectAgent(a) {
  selectedAgent = a;
  renderSidebar();
  renderTab(activeTab);
}

function switchTab(tab) {
  activeTab = tab;
  ['overview','prediction','risk','comparison','agent-detail'].forEach(t => {
    document.getElementById('nav-'+t).classList.toggle('active', t===tab);
  });
  renderTab(tab);
}

function renderTab(tab) {
  destroyCharts();
  const main = document.getElementById('main-content');
  switch(tab) {
    case 'overview': main.innerHTML = buildOverview(); initOverviewCharts(); break;
    case 'prediction': main.innerHTML = buildPrediction(); initPredictionCharts(); break;
    case 'risk': main.innerHTML = buildRisk(); initRiskCharts(); break;
    case 'comparison': main.innerHTML = buildComparison(); initComparisonCharts(); break;
    case 'agent-detail': main.innerHTML = buildAgentDetail(); initAgentDetailCharts(); break;
  }
}

  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });

function getAgentTxns(agent) {
  return MONTHS.map(m => {
    const d = MONTHLY_DATA.find(x=>x.AGENTCODE===agent && x.MONTH===m);
    return d ? d.total_txn : 0;
  });
}

function getAgentAmts(agent) {
  return MONTHS.map(m => {
    const d = MONTHLY_DATA.find(x=>x.AGENTCODE===agent && x.MONTH===m);
    return d ? d.total_amt : 0;
  });
}

async function runPrediction() {
  const agent = selectedAgent;
  const algo = selectedAlgo;
  const txns = getAgentTxns(agent);
  const amts = getAgentAmts(agent);
  const fn = ALGORITHMS[algo];
  const predTxn = Math.round(fn(txns));
  const predAmt = Math.round(fn(amts));

  // Show results area
  document.getElementById('predResultsArea').style.display = '';
  document.getElementById('allAlgoResults').style.display = 'none';
  document.getElementById('aiInsightBox').style.display = '';
  document.getElementById('predAgentLabel').textContent = agent;

  // Compute pseudo R² using leave-one-out on 3 points
  const leaveOnePreds = txns.map((_,i) => {
    const yy = txns.filter((_,j)=>j!==i);
    const xx = fn(yy);
    return xx;
  });
  const r2 = computeR2(txns, leaveOnePreds).toFixed(3);
  const rmse = computeRMSE(txns, leaveOnePreds).toFixed(1);
  const mae = (txns.reduce((s,v,i)=>s+Math.abs(v-leaveOnePreds[i]),0)/txns.length).toFixed(1);

  // Trend analysis
  const trend = predTxn > txns[txns.length-1] ? 'GROWING' : predTxn < txns[txns.length-1] * 0.9 ? 'DECLINING' : 'STABLE';
  const trendColor = trend==='GROWING'?'var(--accent3)':trend==='DECLINING'?'var(--danger)':'var(--warn)';

  // Metrics
  document.getElementById('predMetrics').innerHTML = `
    <div class="chart-title">Prediction Results</div>
    <div class="chart-sub">Algorithm: <strong>${algo}</strong></div>
    <div class="pred-row mt-3">
      <div class="pred-item"><div class="pred-box">
        <div class="pred-label">Predicted Txns (${PRED_MONTH})</div>
        <div class="pred-value">${predTxn.toLocaleString()}</div>
      </div></div>
      <div class="pred-item"><div class="pred-box" style="border-color:rgba(124,58,237,0.3)">
        <div class="pred-label">Predicted Amount</div>
        <div class="pred-value" style="color:#a78bfa">₹${(predAmt/100000).toFixed(1)}L</div>
      </div></div>
    </div>
    <div class="mt-4" style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--muted)">MODEL METRICS</div>
    ${[['R² Score', r2, '#00D4FF'],['RMSE', rmse, '#7C3AED'],['MAE', mae, '#10B981'],
       ['Trend', trend, trendColor]].map(([l,v,c])=>`
    <div class="metric-bar-wrap">
      <div class="metric-bar-label"><span>${l}</span><span style="color:${c};font-family:'Space Mono',monospace;">${v}</span></div>
      ${l==='Trend'?'':`<div class="metric-bar-track"><div class="metric-bar-fill" style="width:${Math.min(parseFloat(v)*100||50,100)}%;background:${c}"></div></div>`}
    </div>`).join('')}
  `;

  // Chart
  if(charts.pred) { charts.pred.destroy(); delete charts.pred; }
  charts.pred = new Chart(document.getElementById('predChart'), {
    type: 'line',
    data: {
      labels: [...MONTH_LABELS, PRED_MONTH],
      datasets: [
        { label: 'Actual Txns', data: [...txns, null],
          borderColor: '#00D4FF', backgroundColor: '#00D4FF22', fill: true,
          borderWidth: 2, pointRadius: 5, tension: 0.4 },
        { label: `Predicted (${algo})`, data: [null, null, txns[2], predTxn],
          borderColor: '#10B981', backgroundColor: '#10B98122', borderDash: [6,4],
          borderWidth: 2, pointRadius: [0,0,5,7], fill: false, tension: 0.4 },
      ]
    },
    options: { responsive:true,
      plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},
      scales:{x:{ticks:{color:'#64748B'},grid:{color:'#1e2d4a'}},
              y:{ticks:{color:'#64748B'},grid:{color:'#1e2d4a'}}}
    }
  });

  // AI Analysis
  document.getElementById('aiOutput').textContent = '⏳ Generating AI analysis...';
  document.getElementById('aiOutput').className = 'ai-output loading';
  await callClaudeForInsight(agent, algo, txns, predTxn, predAmt, r2, trend);
}

async function runAllAlgos() {
  const agent = selectedAgent;
  const txns = getAgentTxns(agent);
  const algoKeys = Object.keys(ALGORITHMS);
  const preds = {};
  let bestAlgo = '', bestPred = 0;

  algoKeys.forEach(k => {
    const p = Math.round(ALGORITHMS[k](txns));
    preds[k] = p;
  });

  // Best = closest to weighted avg (simulate "best")
  const allPreds = Object.values(preds);
  const avgPred = allPreds.reduce((a,b)=>a+b,0)/allPreds.length;
  let minDist = Infinity;
  algoKeys.forEach(k => {
    const d = Math.abs(preds[k] - avgPred);
    if(d < minDist) { minDist=d; bestAlgo=k; bestPred=preds[k]; }
  });

  document.getElementById('predResultsArea').style.display = 'none';
  document.getElementById('allAlgoResults').style.display = '';
  document.getElementById('aiInsightBox').style.display = '';
  document.getElementById('bestAlgoLabel').style.display = '';
  document.getElementById('bestAlgoLabel').textContent = `🏆 Best: ${bestAlgo} → ${bestPred} txns`;

  // Bar chart comparison
  if(charts.algoCompare) { charts.algoCompare.destroy(); delete charts.algoCompare; }
  const colors = algoKeys.map(k => k===bestAlgo ? '#10B981' : '#00D4FF55');
  const borderColors = algoKeys.map(k => k===bestAlgo ? '#10B981' : '#00D4FF');
  charts.algoCompare = new Chart(document.getElementById('algoCompareChart'), {
    type: 'bar',
    data: {
      labels: algoKeys.map(k=>k.split(' ')[0]),
      datasets:[{ label:'Predicted Txns',
        data: algoKeys.map(k=>preds[k]),
        backgroundColor: colors, borderColor: borderColors, borderWidth: 2 }]
    },
    options:{ responsive:true, plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#64748B'},grid:{color:'#1e2d4a'}},
              y:{ticks:{color:'#64748B'},grid:{color:'#1e2d4a'}}}
    }
  });

  // Model score cards
  document.getElementById('modelScores').innerHTML = algoKeys.map(k=>`
    <div class="model-score-card ${k===bestAlgo?'best':''}">
      <div class="model-name">${k}</div>
      <div class="model-r2 ${k===bestAlgo?'best-score':''}">${preds[k].toLocaleString()}</div>
      <div class="model-rmse">txns</div>
      ${k===bestAlgo?'<div class="best-label">🏆 CONSENSUS BEST</div>':''}
    </div>`).join('');

  // AI Analysis
  document.getElementById('aiOutput').textContent = '⏳ Generating AI analysis...';
  document.getElementById('aiOutput').className = 'ai-output loading';
  await callClaudeForCompare(agent, preds, bestAlgo, txns);
}

async function callClaudeForInsight(agent, algo, txns, predTxn, predAmt, r2, trend) {
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages:[{ role:'user', content:`You are a banking analytics expert analyzing IOB banking correspondent agent performance.

Agent: ${agent}
Algorithm used: ${algo}
Historical monthly transactions: Nov=${txns[0]}, Dec=${txns[1]}, Feb=${txns[2]}
Predicted Mar 2026 transactions: ${predTxn}
Predicted Mar 2026 amount: ₹${(predAmt/100000).toFixed(1)}L
Model R²: ${r2}
Trend: ${trend}

Provide a concise 3-4 sentence analysis covering:
1. What the prediction means for this agent
2. Key behavioral insights from the historical pattern
3. One actionable recommendation for the bank manager

Be specific, professional, and data-driven. No bullet points, flowing prose.`}]
      })
    });
    const data = await resp.json();
    const text = data.content?.[0]?.text || 'Analysis unavailable.';
    document.getElementById('aiOutput').textContent = text;
    document.getElementById('aiOutput').className = 'ai-output';
  } catch(e) {
    document.getElementById('aiOutput').textContent = `Analysis: Agent ${agent} shows a ${txns[0]<txns[2]?'growing':'declining'} trend with ${algo} predicting ${predTxn} transactions for ${PRED_MONTH}. The ${trend} trend suggests ${trend==='GROWING'?'expansion opportunities':'attention is needed'}. Consider reviewing transaction patterns and providing targeted support.`;
    document.getElementById('aiOutput').className = 'ai-output';
  }
}

async function callClaudeForCompare(agent, preds, bestAlgo, txns) {
  const predSummary = Object.entries(preds).map(([k,v])=>`${k}: ${v}`).join(', ');
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages:[{ role:'user', content:`Banking analytics expert analyzing agent ${agent}.
Historical: Nov=${txns[0]}, Dec=${txns[1]}, Feb=${txns[2]} transactions.
All model predictions for Mar 2026: ${predSummary}
Consensus best model: ${bestAlgo} with ${preds[bestAlgo]} predicted transactions.

In 3-4 sentences: explain why prediction models diverge, which models to trust for this data pattern, and what the consensus prediction means for planning. Be specific and professional.`}]
      })
    });
    const data = await resp.json();
    const text = data.content?.[0]?.text || 'Analysis unavailable.';
    document.getElementById('aiOutput').textContent = text;
    document.getElementById('aiOutput').className = 'ai-output';
  } catch(e) {
    const vals = Object.values(preds);
    const range = Math.max(...vals) - Math.min(...vals);
    document.getElementById('aiOutput').textContent = `The ${Object.keys(preds).length} models show a prediction range of ${range.toLocaleString()} transactions for ${PRED_MONTH}. ${bestAlgo} represents the consensus estimate at ${preds[bestAlgo]} transactions. Models with sequence sensitivity (LSTM, ARIMA) may capture recent momentum better while ensemble methods (Random Forest, XGBoost) tend to be more stable for sparse datasets like this 3-month series.`;
    document.getElementById('aiOutput').className = 'ai-output';
  }
}

Medium risk count: ${medRisk}
Total agents: ${AGENTS.length}

Provide a 3-4 sentence network-wide risk assessment covering: overall network health, the most critical risks, and 2 specific actions the bank should take. Professional and actionable.`}]
      })
    });

function initComparisonCharts() {}

async function runFullComparison() {
  const algoKeys = Object.keys(ALGORITHMS);
  const results = AGENTS.map(agent => {
    const txns = getAgentTxns(agent);
    const preds = {};
    algoKeys.forEach(k => { preds[k] = Math.round(ALGORITHMS[k](txns)); });
    const avg = Object.values(preds).reduce((a,b)=>a+b,0)/algoKeys.length;
    let bestAlgo='', minD=Infinity;
    algoKeys.forEach(k=>{ const d=Math.abs(preds[k]-avg); if(d<minD){minD=d;bestAlgo=k;} });
    return { agent, preds, bestAlgo, consensus: preds[bestAlgo], lastTxn: txns[2] };
  });

  document.getElementById('compResultsArea').style.display = '';

  // Bar chart
  if(charts.comp) { charts.comp.destroy(); delete charts.comp; }
  charts.comp = new Chart(document.getElementById('compChart'), {
    type: 'bar',
    data: {
      labels: results.map(r=>r.agent.replace('IOB','')),
      datasets:[
        { label:'Feb 2026 (Actual)', data:results.map(r=>r.lastTxn), backgroundColor:'#00D4FF44', borderColor:'#00D4FF', borderWidth:1 },
        { label:'Mar 2026 (Predicted)', data:results.map(r=>r.consensus), backgroundColor:'#10B98166', borderColor:'#10B981', borderWidth:1 }
      ]
    },
    options:{ responsive:true, plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},
      scales:{x:{ticks:{color:'#64748B',font:{size:9}},grid:{color:'#1e2d4a'}},
              y:{ticks:{color:'#64748B'},grid:{color:'#1e2d4a'}}}
    }
  });

  // Table
  const table = document.getElementById('compTable');
  table.innerHTML = `<thead><tr>
    <th>Agent</th>
    ${algoKeys.map(k=>`<th>${k.split(' ')[0]}</th>`).join('')}
    <th>Best Model</th><th>Consensus</th>
  </tr></thead>
  <tbody>${results.map(r=>`<tr>
    <td style="font-family:'Space Mono',monospace;font-size:11px;">${r.agent.replace('IOB','')}</td>
    ${algoKeys.map(k=>`<td style="font-family:'Space Mono',monospace;color:${k===r.bestAlgo?'var(--accent3)':'var(--text)'}">${r.preds[k].toLocaleString()}</td>`).join('')}
    <td style="font-size:10px;color:var(--accent3);">${r.bestAlgo}</td>
    <td style="font-family:'Space Mono',monospace;font-weight:700;color:var(--accent);">${r.consensus.toLocaleString()}</td>
  </tr>`).join('')}</tbody>`;

  // AI
  document.getElementById('compAiOutput').textContent = '⏳ Generating intelligence report...';
  const totalPred = results.reduce((s,r)=>s+r.consensus,0);
  const totalActual = results.reduce((s,r)=>s+r.lastTxn,0);
  const growth = ((totalPred-totalActual)/totalActual*100).toFixed(1);
  const topAgents = results.sort((a,b)=>b.consensus-a.consensus).slice(0,3).map(r=>`${r.agent}(${r.consensus})`).join(', ');
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000,
        messages:[{role:'user',content:`IOB BC network full model comparison results:
Total predicted network transactions for Mar 2026: ${totalPred.toLocaleString()} (${growth}% vs Feb)
Top predicted agents: ${topAgents}
20 agents, 10 ML models compared.

Write a 3-4 sentence executive summary covering: network growth outlook, reliability of ensemble consensus predictions, and one strategic recommendation for the IOB network team.`}]
      })
    });
    const data = await resp.json();
    document.getElementById('compAiOutput').textContent = data.content?.[0]?.text||'Report unavailable.';
    document.getElementById('compAiOutput').className = 'ai-output';
  } catch(e) {
    document.getElementById('compAiOutput').textContent = `The full network comparison across 10 ML algorithms projects ${totalPred.toLocaleString()} total transactions for Mar 2026, representing a ${growth}% change from Feb 2026. Leading agents by predicted volume are ${topAgents}. The consensus approach averaging multiple models provides more stable predictions than individual algorithms for this 3-month sparse dataset. The network team should focus resources on top-predicted agents while monitoring high-risk declining agents.`;
    document.getElementById('compAiOutput').className = 'ai-output';
  }
}

async function callAgentDetailAI(agent, txns, amts, algoPreds) {
  const predSummary = Object.entries(algoPreds).slice(0,5).map(([k,v])=>`${k}:${v}`).join(', ');
  const risk = computeRisk(agent);
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000,
        messages:[{role:'user',content:`Detailed analysis for IOB BC agent ${agent}:
Transaction history: Nov=${txns[0]}, Dec=${txns[1]}, Feb=${txns[2]}
Transaction amounts (₹): Nov=${amts[0]}, Dec=${amts[1]}, Feb=${amts[2]}
Risk level: ${risk.level} (score: ${risk.score})
Risk factors: ${risk.factors.join('; ')||'None'}
Key model predictions for Mar 2026: ${predSummary}

Write a focused 4-5 sentence agent intelligence report covering:
1. This agent's behavioral pattern and what drives it
2. The prediction outlook and confidence level
3. Risk profile interpretation
4. One specific action recommendation for the relationship manager

Be precise and data-driven.`}]
      })
    });
    const data = await resp.json();
    document.getElementById('detailAiOutput').textContent = data.content?.[0]?.text||'Report unavailable.';
    document.getElementById('detailAiOutput').className = 'ai-output';
  } catch(e) {
    const trend = txns[2]>txns[0]?'upward':'downward';
    document.getElementById('detailAiOutput').textContent = `Agent ${agent} demonstrates an ${trend} transaction trend with ${txns[2].toLocaleString()} transactions in Feb 2026, ${txns[2]>txns[0]?'up':'down'} from ${txns[0].toLocaleString()} in Nov 2025. The risk classification of ${risk.level} (score: ${risk.score}/100) is driven by ${risk.factors[0]||'stable performance patterns'}. Across 10 prediction models, the consensus estimate for Mar 2026 ranges with moderate variance, suggesting ${txns[2]>txns[1]?'continued momentum':'potential for recovery'}. The relationship manager should ${risk.level==='HIGH'?'prioritize a performance review and identify operational barriers':'continue current engagement and explore upsell opportunities'}.`;
    document.getElementById('detailAiOutput').className = 'ai-output';
  }
}
